<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Сити-Класс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="images/logo.png" alt="Логотип Сити-Класс" width="120">
        </div>
        <div class="site-name">СИТИ-КЛАСС</div>
    </header>

    <nav class="top-menu">
        <a href="index.html">🏠 Главная</a>
        <a href="catalog.html">👟 Наша обувь</a>
        <a href="about.html">🏢 О магазине</a>
        <a href="contacts.html">📞 Контакты</a>
        <a href="feedback.html">📝 Отзывы</a>
        <a href="register.html">📝 Регистрация</a>
        <a href="login.html">🔐 Вход</a>
    </nav>

    <div class="container">
        <aside class="left-sidebar">
            <h3>📋 Меню</h3>
            <ul class="side-menu">
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="catalog.html">👟 Каталог</a></li>
                <li><a href="about.html">🏢 О нас</a></li>
                <li><a href="contacts.html">📞 Контакты</a></li>
                <li><a href="feedback.html">📝 Отзывы</a></li>
                <li><a href="register.html">📝 Регистрация</a></li>
                <li><a href="login.html">🔐 Вход</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h1>АВТОРИЗАЦИЯ</h1>
            <hr>

            <form class="login-form-main" id="loginForm">
                <label>
                    Логин:
                    <input type="text" name="login" required placeholder="Введите логин">
                </label>

                <label>
                    Пароль:
                    <input type="password" name="password" required placeholder="Введите пароль">
                </label>

                <div id="loginError" class="error-message"></div>
                <div id="loginSuccess" class="success-message"></div>

                <button type="submit">Войти</button>
                <button type="reset">Очистить</button>
            </form>
        </main>

        <aside class="right-sidebar">
            <div class="banner">
                <a href="catalog.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8Yhd3NrRexdGSo1C6mSpyZUZh2gEGNKq3og&s" alt="Новая коллекция" width="180">
                    <p>✨ Новая коллекция</p>
                </a>
            </div>
        </aside>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Сити-Класс. Все права защищены</p>
    </footer>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const login = document.querySelector('input[name="login"]').value.trim();
        const password = document.querySelector('input[name="password"]').value.trim();

        const userData = localStorage.getItem('userCityClass');
        const errorDiv = document.getElementById('loginError');
        const successDiv = document.getElementById('loginSuccess');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        if (!userData) {
            errorDiv.innerHTML = '❌ Пользователь не найден. Сначала зарегистрируйтесь.';
            errorDiv.style.display = 'block';
            return;
        }

        const user = JSON.parse(userData);

        if (login === user.login && password === user.password) {
            successDiv.innerHTML = '✅ Авторизация успешна!';
            successDiv.style.display = 'block';

            setTimeout(function() {
                window.location.href = 'account.html';
            }, 1500);
        } else {
            errorDiv.innerHTML = '❌ Неверный логин или пароль.';
            errorDiv.style.display = 'block';
        }
    });
    </script>
</body>
</html>
