<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Сити-Класс</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvd-KsgNyl7pBfn2IEu7-Uu8fhbkM8LjqYvQ&s" 
                 alt="Логотип Winx" width="140">
        </div>
        <div class="site-name">СИТИ-КЛАСС</div>
        <div class="login-form">
            <form action="#" method="post">
                <label>логин: <input type="text" name="login"></label><br>
                <label>пароль: <input type="password" name="password"></label><br>
                <a href="register.html" class="register-link">регистрация</a>
                <button type="submit">войти</button>
            </form>
        </div>
    </header>

    <nav class="top-menu">
        <a href="index.html">🏠 Главная</a>
        <a href="catalog.html">👟 Наша обувь</a>
        <a href="about.html">🏢 О магазине</a>
        <a href="contacts.html">📞 Контакты</a>
    </nav>

    <div class="container">
        <aside class="left-sidebar">
            <h3>📋 Меню</h3>
            <ul class="side-menu">
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="catalog.html">👟 Каталог</a></li>
                <li><a href="about.html">🏢 О нас</a></li>
                <li><a href="contacts.html">📞 Контакты</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h1>РЕГИСТРАЦИЯ</h1>
            <hr>
            
            <form class="register-form" id="registerForm">
                <label class="required">
                    Имя:*
                    <input type="text" name="name" required placeholder="Введите ваше имя">
                </label>
                
                <label class="required">
                    Фамилия:*
                    <input type="text" name="surname" required placeholder="Введите вашу фамилию">
                </label>
                
                <label class="required">
                    Email:*
                    <input type="email" name="email" required placeholder="example@mail.ru">
                </label>
                
                <label>
                    Телефон:
                    <input type="tel" name="phone" placeholder="+7 (___) ___-__-__">
                </label>
                
                <label class="required">
                    Логин:*
                    <input type="text" name="login" required placeholder="Придумайте логин">
                </label>
                
                <label class="required">
                    Пароль:*
                    <input type="password" id="password" name="password" required placeholder="Минимум 6 символов">
                </label>
                
                <label class="required">
                    Подтвердите пароль:*
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="Повторите пароль">
                </label>
                
                <label>
                    <input type="checkbox" name="agree" required>
                    Я согласен с <a href="#">условиями использования</a>*
                </label>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <button type="submit">Зарегистрироваться</button>
                <button type="reset">Очистить</button>
            </form>
            
            <p>Уже есть аккаунт? <a href="index.html">Войти</a></p>
        </main>

        <aside class="right-sidebar">
            <div class="banner">
                <a href="delivery.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxbGjbxj0oPxJz_Dk8G3tuIlVLmPiE_x8_SQ&s" 
                         alt="Бесплатная доставка" width="180">
                    <p>🚚 Бесплатная доставка</p>
                </a>
            </div>
            <div class="banner">
                <a href="catalog.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8Yhd3NrRexdGSo1C6mSpyZUZh2gEGNKq3og&s" 
                         alt="Новая коллекция" width="180">
                    <p>✨ Новая коллекция</p>
                </a>
            </div>
            <div class="banner">
                <a href="discounts.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2Howx1kBT1KffR3kuPvFpRAb6RnygHH73ow&s" 
                         alt="Скидки 50%" width="180">
                    <p>🔥 Скидки 50%</p>
                </a>
            </div>
        </aside>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Сити-Класс. Все права защищены</p>
    </footer>

    <script>
document.getElementById('registerForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
 
    var name = document.querySelector('input[name="name"]').value.trim();
    var surname = document.querySelector('input[name="surname"]').value.trim();
    var email = document.querySelector('input[name="email"]').value.trim();
    var phone = document.querySelector('input[name="phone"]').value.trim();
    var login = document.querySelector('input[name="login"]').value.trim();
    var pass1 = document.getElementById('password').value;
    var pass2 = document.getElementById('password_confirm').value;
    var agree = document.querySelector('input[name="agree"]').checked;
    
    var errorDiv = document.getElementById('errorMessage');
    var successDiv = document.getElementById('successMessage');
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
  
    if (!agree) {
        errorDiv.innerHTML = '❌ Вы должны согласиться с условиями!';
        errorDiv.style.display = 'block';
        errorDiv.style.color = '#FF1493';
        return;
    }
    
    if (pass1 !== pass2) {
        errorDiv.innerHTML = '❌ Пароли не совпадают!';
        errorDiv.style.display = 'block';
        errorDiv.style.color = '#FF1493';
        return;
    }
    
    if (pass1.length < 6) {
        errorDiv.innerHTML = '❌ Пароль должен быть минимум 6 символов!';
        errorDiv.style.display = 'block';
        errorDiv.style.color = '#FF1493';
        return;
    }
    
    if (!email.includes('@')) {
        errorDiv.innerHTML = '❌ Введите корректный Email!';
        errorDiv.style.display = 'block';
        errorDiv.style.color = '#FF1493';
        return;
    }

    var userData = {
        name: name,
        surname: surname,
        email: email,
        phone: phone,
        login: login,
        registered: new Date().toLocaleDateString('ru-RU')
    };
    
    localStorage.setItem('userCityClass', JSON.stringify(userData));
    
    // Успешная регистрация
    successDiv.innerHTML = '✅ Регистрация успешна! Добро пожаловать, ' + name + '!';
    successDiv.style.display = 'block';
    successDiv.style.color = '#32CD32';
    successDiv.style.background = 'rgba(50, 205, 50, 0.1)';
    successDiv.style.padding = '10px';
    successDiv.style.borderRadius = '5px';
    successDiv.style.margin = '10px 0';
    
    setTimeout(function() {
        window.location.href = 'account.html';
    }, 2000);
});
</script>
</body>
</html>
