<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Сити-Класс</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="images/logo.png" alt="Логотип Сити-Класс" width="120">
        </div>
        <div class="site-name">СИТИ-КЛАСС</div>
        <div class="login-form">
            <form action="#" method="post" id="headerLoginForm">
                <label>логин: <input type="text" name="login"></label><br>
                <label>пароль: <input type="password" name="password"></label><br>
                <a href="register.html" class="register-link">регистрация</a>
                <button type="submit">войти</button>
            </form>
        </div>
    </header>

    <nav class="top-menu">
        <a href="index.html">🏠 Главная</a>
        <a href="catalog.html">👟 Наша обувь</a>
        <a href="about.html">🏢 О магазине</a>
        <a href="contacts.html">📞 Контакты</a>
        <a href="feedback.html">📝 Отзывы</a>
    </nav>

    <div class="container">
        <aside class="left-sidebar">
            <h3>📋 Меню</h3>
            <ul class="side-menu">
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="catalog.html">👟 Каталог</a></li>
                <li><a href="about.html">🏢 О нас</a></li>
                <li><a href="contacts.html">📞 Контакты</a></li>
                <li><a href="feedback.html">📝 Отзывы</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <h1>РЕГИСТРАЦИЯ</h1>
            <hr>

            <form class="register-form" id="registerForm">
                <label class="required">
                    Имя:*
                    <input type="text" name="name" required placeholder="Введите ваше имя">
                </label>

                <label class="required">
                    Фамилия:*
                    <input type="text" name="surname" required placeholder="Введите вашу фамилию">
                </label>

                <label class="required">
                    Email:*
                    <input type="email" name="email" required placeholder="example@mail.ru">
                </label>

                <label>
                    Телефон:
                    <input type="tel" name="phone" placeholder="+7 (___) ___-__-__">
                </label>

                <label class="required">
                    Логин:*
                    <input type="text" name="login" required placeholder="Придумайте логин">
                </label>

                <label class="required">
                    Пароль:*
                    <input type="password" name="password" required placeholder="Минимум 6 символов">
                </label>

                <label class="required">
                    Подтвердите пароль:*
                    <input type="password" name="password_confirm" required placeholder="Повторите пароль">
                </label>

                <label>
                    <input type="checkbox" name="agree" required>
                    Я согласен с условиями использования*
                </label>

                <button type="submit">Зарегистрироваться</button>
                <button type="reset">Очистить</button>

                <div id="registerMessage" class="success-message"></div>
                <div id="registerError" class="error-message"></div>
            </form>
        </main>

        <aside class="right-sidebar">
            <div class="banner">
                <a href="delivery.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxbGjbxj0oPxJz_Dk8G3tuIlVLmPiE_x8_SQ&s" alt="Бесплатная доставка" width="180">
                    <p>🚚 Бесплатная доставка</p>
                </a>
            </div>
            <div class="banner">
                <a href="catalog.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8Yhd3NrRexdGSo1C6mSpyZUZh2gEGNKq3og&s" alt="Новая коллекция" width="180">
                    <p>✨ Новая коллекция</p>
                </a>
            </div>
            <div class="banner">
                <a href="discounts.html">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2Howx1kBT1KffR3kuPvFpRAb6RnygHH73ow&s" alt="Скидки 50%" width="180">
                    <p>🔥 Скидки 50%</p>
                </a>
            </div>
        </aside>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Сити-Класс. Все права защищены</p>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const loginForm = document.getElementById('headerLoginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();

                const login = loginForm.querySelector('input[name="login"]').value.trim();
                const password = loginForm.querySelector('input[name="password"]').value.trim();
                const savedUser = localStorage.getItem('userCityClass');

                if (!savedUser) {
                    alert('❌ Нет зарегистрированного пользователя. Сначала зарегистрируйтесь.');
                    return;
                }

                const user = JSON.parse(savedUser);

                if (login === user.login && password === user.password) {
                    alert('✅ Вход выполнен успешно!');
                    window.location.href = 'account.html';
                } else {
                    alert('❌ Неверный логин или пароль.');
                }
            });
        }

        const form = document.getElementById('registerForm');
        const successBox = document.getElementById('registerMessage');
        const errorBox = document.getElementById('registerError');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            successBox.classList.remove('show');
            errorBox.classList.remove('show');
            successBox.textContent = '';
            errorBox.textContent = '';

            const agree = form.querySelector('input[name="agree"]').checked;
            const password = form.querySelector('input[name="password"]').value.trim();
            const passwordConfirm = form.querySelector('input[name="password_confirm"]').value.trim();

            if (!agree) {
                errorBox.textContent = '❌ Нужно согласиться с условиями.';
                errorBox.classList.add('show');
                return;
            }

            if (password !== passwordConfirm) {
                errorBox.textContent = '❌ Пароли не совпадают.';
                errorBox.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorBox.textContent = '❌ Пароль должен содержать минимум 6 символов.';
                errorBox.classList.add('show');
                return;
            }

            try {
                const response = await fetch('save_register.php', {
                    method: 'POST',
                    body: new FormData(form)
                });

                const result = (await response.text()).trim();

                if (result === 'success') {
                    const loginValue = form.querySelector('input[name="login"]').value.trim();

                    const userData = {
                    name: form.querySelector('input[name="name"]').value.trim(),
                    surname: form.querySelector('input[name="surname"]').value.trim(),
                    email: form.querySelector('input[name="email"]').value.trim(),
                    phone: form.querySelector('input[name="phone"]').value.trim(),
                    login: form.querySelector('input[name="login"]').value.trim(),
                    password: password,
                    registered: new Date().toLocaleDateString('ru-RU')
                };

                localStorage.setItem('userCityClass', JSON.stringify(userData));

                    successBox.textContent = '✅ Регистрация успешно выполнена!';
                    successBox.classList.add('show');
                    form.reset();
                } else {
                    errorBox.textContent = result || '❌ Не удалось зарегистрироваться.';
                    errorBox.classList.add('show');
                }
            } catch (e) {
                errorBox.textContent = '❌ Ошибка соединения с сервером.';
                errorBox.classList.add('show');
            }
        });
    });
    </script>
</body>
</html>
