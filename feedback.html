    <div class="container">
        <aside class="left-sidebar">
            <h3>📋 Меню</h3>
            <ul class="side-menu">
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="catalog.html">👟 Каталог</a></li>
                <li><a href="about.html">🏢 О нас</a></li>

            </ul>
        </aside>

        <main class="main-content">
            <h1>📝 ОСТАВИТЬ ОТЗЫВ</h1>
            <hr>
            
            <form class="register-form" action="feedback.php" method="post">
                <!-- Однострочное текстовое поле -->
                <label class="required">
                    Ваше имя:*
                    <input type="text" name="name" required placeholder="Введите имя">
                </label>
                
                <!-- Email поле -->
                <label class="required">
                    Email:*
                    <input type="email" name="email" required placeholder="example@mail.ru">
                </label>
                
                <!-- Выпадающий список -->
                <label class="required">
                    Категория товара:*
                    <select name="category" required>
                        <option value="">-- Выберите категорию --</option>
                        <option value="sneakers">👟 Кроссовки</option>
                        <option value="shoes">👠 Туфли</option>
                        <option value="boots">👢 Ботинки</option>
                        <option value="slippers">🩴 Тапочки</option>
                    </select>
                </label>
                
                <!-- Радио кнопки -->
                <label class="required">
                    Оценка товара:*
                    <div class="radio-group">
                        <input type="radio" name="rating" value="5" required> ⭐⭐⭐⭐⭐ (5)
                        <input type="radio" name="rating" value="4"> ⭐⭐⭐⭐ (4)
                        <input type="radio" name="rating" value="3"> ⭐⭐⭐ (3)
                        <input type="radio" name="rating" value="2"> ⭐⭐ (2)
                        <input type="radio" name="rating" value="1"> ⭐ (1)
                    </div>
                </label>
                
                <!-- Чекбоксы -->
                <label>
                    Достоинства товара:
                    <div class="checkbox-group">
                        <input type="checkbox" name="pros[]" value="quality"> Качество
                        <input type="checkbox" name="pros[]" value="comfort"> Удобство
                        <input type="checkbox" name="pros[]" value="design"> Дизайн
                        <input type="checkbox" name="pros[]" value="price"> Цена
                    </div>
                </label>
                
                <!-- Многострочное текстовое поле -->
                <label class="required">
                    Ваш отзыв:*
                    <textarea name="review" rows="5" required placeholder="Напишите ваш отзыв..."></textarea>
                </label>
                
                <!-- Переключатель (checkbox как toggle) -->
                <label>
                    <input type="checkbox" name="recommend" value="yes">
                    Рекомендую этот товар другим покупателям
                </label>
                
                <!-- Скрытое поле -->
                <input type="hidden" name="form_type" value="feedback">
                
                <!-- Кнопка отправки -->
                <button type="submit">Отправить отзыв</button>
                <button type="reset">Очистить</button>
            </form>
        </main>
